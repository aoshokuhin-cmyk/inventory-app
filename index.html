<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理アプリ</title>

<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
button{padding:10px;margin:5px;font-size:16px}
input{padding:8px;margin:5px;font-size:16px}
#reader{width:300px;margin-top:10px}

table{border-collapse:collapse;margin-top:20px;width:100%}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
</style>
</head>

<body>

<h2>在庫管理アプリ</h2>

<button onclick="startScanner()">バーコードスキャン</button>
<button onclick="addProduct()">商品追加</button>
<button onclick="setStock()">在庫数入力</button>
<button onclick="searchProduct()">商品検索</button>
<button onclick="exportCSV()">CSV出力</button>

<br>

<input id="barcode" placeholder="バーコード">
<input id="name" placeholder="商品名">
<input id="stock" placeholder="在庫数">
<input id="search" placeholder="検索">

<div id="reader"></div>

<table>
<thead>
<tr>
<th>バーコード</th>
<th>商品名</th>
<th>在庫</th>
<th>編集</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let db = JSON.parse(localStorage.getItem("inventory") || "{}")

function save(){
localStorage.setItem("inventory",JSON.stringify(db))
render()
}

function render(){

const tbody=document.getElementById("tbody")

tbody.innerHTML=""

for(let code in db){

let row=`<tr>
<td>${code}</td>
<td>${db[code].name}</td>
<td>${db[code].stock}</td>
<td><button onclick="editProduct('${code}')">編集</button></td>
<td><button onclick="deleteProduct('${code}')">削除</button></td>
</tr>`


tbody.innerHTML += row

}

}

function addProduct(){

let code=document.getElementById("barcode").value
let name=document.getElementById("name").value

if(!code || !name){
alert("バーコードと商品名を入力してください")
return
}

if(!db[code]){

db[code]={name:name,stock:0}

}

save()

}

function setStock(){

let code=document.getElementById("barcode").value
let stock=parseInt(document.getElementById("stock").value)

if(!db[code]){
alert("商品を登録してください")
return
}

if(isNaN(stock)){
alert("在庫数を入力してください")
return
}


db[code].stock = stock

save()

}

function editProduct(code){

let newName = prompt("新しい商品名",db[code].name)

if(newName){

db[code].name = newName

save()

}

}

function deleteProduct(code){

if(confirm("削除しますか？")){

delete db[code]

save()

}

}

function searchProduct(){

let q=document.getElementById("search").value

const tbody=document.getElementById("tbody")

tbody.innerHTML=""

for(let code in db){

if(code.includes(q) || db[code].name.includes(q)){

let row=`<tr>
<td>${code}</td>
<td>${db[code].name}</td>
<td>${db[code].stock}</td>
<td><button onclick="editProduct('${code}')">編集</button></td>
<td><button onclick="deleteProduct('${code}')">削除</button></td>
</tr>`


tbody.innerHTML += row

}

}

}

function exportCSV(){

let csv="バーコード,商品名,在庫\n"

for(let code in db){

csv += `${code},${db[code].name},${db[code].stock}\n`

}

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="inventory.csv"

a.click()

}

function startScanner(){

const qr = new Html5Qrcode("reader")

qr.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(code)=>{

document.getElementById("barcode").value = code

qr.stop()

}

)

}

render()

</script>

</body>
</html>
