<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理アプリ</title>

<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
button{padding:10px;margin:5px;font-size:16px}
input{padding:8px;margin:5px;font-size:16px}
#reader{width:300px;margin-top:10px}

table{border-collapse:collapse;margin-top:20px;width:100%}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
#total{margin-top:15px;font-weight:bold;font-size:18px}
</style>
</head>

<body>

<h2>在庫管理アプリ</h2>

<button onclick="startScanner()">バーコードスキャン</button>
<button onclick="addProduct()">商品追加</button>
<button onclick="setStock()">在庫数入力</button>
<button onclick="searchProduct()">商品検索</button>
<button onclick="exportCSV()">CSV出力</button>

<br>

<input id="barcode" placeholder="バーコード">
<input id="name" placeholder="商品名">
<input id="sell" placeholder="売値">
<input id="buy" placeholder="買値">
<input id="stock" placeholder="在庫数">
<input id="search" placeholder="検索">

<div id="reader"></div>

<div id="total">在庫金額合計（買値）: 0</div>

<table>
<thead>
<tr>
<th>バーコード</th>
<th>商品名</th>
<th>売値</th>
<th>買値</th>
<th>在庫</th>
<th>編集</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let db = JSON.parse(localStorage.getItem("inventory") || "{}")

function save(){
localStorage.setItem("inventory",JSON.stringify(db))
render()
}

function render(){

const tbody=document.getElementById("tbody")
let totalValue = 0

tbody.innerHTML=""

for(let code in db){

let item=db[code]

let value = (item.buy || 0) * (item.stock || 0)

totalValue += value

let row=`<tr>
<td>${code}</td>
<td>${item.name}</td>
<td>${item.sell}</td>
<td>${item.buy}</td>
<td>${item.stock}</td>
<td><button onclick="editProduct('${code}')">編集</button></td>
<td><button onclick="deleteProduct('${code}')">削除</button></td>
</tr>`


tbody.innerHTML += row

}


document.getElementById("total").innerText = "在庫金額合計（買値）: " + totalValue

}

function addProduct(){

let code=document.getElementById("barcode").value
let name=document.getElementById("name").value
let sell=parseFloat(document.getElementById("sell").value) || 0
let buy=parseFloat(document.getElementById("buy").value) || 0

if(!code || !name){
alert("バーコードと商品名を入力してください")
return
}

if(!db[code]){

db[code]={name:name,buy:buy,sell:sell,stock:0}

}

save()

}

function setStock(){

let code=document.getElementById("barcode").value
let stock=parseInt(document.getElementById("stock").value)

if(!db[code]){
alert("商品を登録してください")
return
}

if(isNaN(stock)){
alert("在庫数を入力してください")
return
}


db[code].stock = stock

save()

}

function editProduct(code){

let newName = prompt("商品名",db[code].name)
let newSell = prompt("売値",db[code].sell)
let newBuy = prompt("買値",db[code].buy)

if(newName!==null){db[code].name=newName}
if(newSell!==null){db[code].sell=parseFloat(newSell)||0}
if(newBuy!==null){db[code].buy=parseFloat(newBuy)||0}

save()

}

function deleteProduct(code){

if(confirm("削除しますか？")){

delete db[code]

save()

}

}

function searchProduct(){

let q=document.getElementById("search").value

const tbody=document.getElementById("tbody")

let totalValue = 0

tbody.innerHTML=""

for(let code in db){

let item=db[code]

if(code.includes(q) || item.name.includes(q)){

let value = (item.buy || 0) * (item.stock || 0)

totalValue += value

let row=`<tr>
<td>${code}</td>
<td>${item.name}</td>
<td>${item.sell}</td>
<td>${item.buy}</td>
<td>${item.stock}</td>
<td><button onclick="editProduct('${code}')">編集</button></td>
<td><button onclick="deleteProduct('${code}')">削除</button></td>
</tr>`


tbody.innerHTML += row

}

}


document.getElementById("total").innerText = "在庫金額合計（買値）: " + totalValue

}

function exportCSV(){

let csv="バーコード,商品名,売値,買値,在庫\n"

for(let code in db){

let item=db[code]

csv += `${code},${item.name},${item.sell},${item.buy},${item.stock}\n`

}

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="inventory.csv"

a.click()

}

function startScanner(){

const qr = new Html5Qrcode("reader")

qr.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(code)=>{

document.getElementById("barcode").value = code

qr.stop()

}

)

}

render()

</script>

</body>
</html>
