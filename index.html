<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫管理アプリ</title>

<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
button{padding:10px;margin:5px;font-size:16px}
input{padding:6px;margin:3px;font-size:14px}
#reader{width:300px;margin-top:10px}

table{border-collapse:collapse;margin-top:20px;width:100%}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
#total{margin-top:15px;font-weight:bold;font-size:18px}
.tableInput{width:80px}
</style>
</head>

<body>

<h2>在庫管理アプリ</h2>

<button onclick="startScanner()">バーコードスキャン</button>
<button onclick="addProduct()">商品追加</button>
<button onclick="searchProduct()">商品検索</button>
<button onclick="exportCSV()">CSV出力</button>

<br>

<input id="barcode" placeholder="バーコード">
<input id="name" placeholder="商品名">
<input id="sell" placeholder="売値">
<input id="buy" placeholder="買値">
<input id="stock" placeholder="在庫数">
<input id="search" placeholder="検索">

<div id="reader"></div>

<div id="total">在庫金額合計（買値）: 0</div>

<table>
<thead>
<tr>
<th>バーコード</th>
<th>商品名</th>
<th>売値</th>
<th>買値</th>
<th>在庫</th>
<th>削除</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let db = JSON.parse(localStorage.getItem("inventory") || "{}")

function save(){
localStorage.setItem("inventory",JSON.stringify(db))
render()
}

function updateField(code,field,value){

if(field === 'stock') value = parseInt(value) || 0
else value = parseFloat(value) || 0

if(field === 'name') value = value || ""

if(!db[code]) return

if(field==='sell') db[code].sell=value
if(field==='buy') db[code].buy=value
if(field==='stock') db[code].stock=value

save()

}

function render(){

const tbody=document.getElementById("tbody")
let totalValue = 0

tbody.innerHTML=""

for(let code in db){

let item=db[code]

let value=(item.buy||0)*(item.stock||0)

totalValue += value

let row=`
<tr>
<td>${code}</td>
<td>${item.name}</td>
<td><input class="tableInput" value="${item.sell}" onchange="updateField('${code}','sell',this.value)"></td>
<td><input class="tableInput" value="${item.buy}" onchange="updateField('${code}','buy',this.value)"></td>
<td><input class="tableInput" value="${item.stock}" onchange="updateField('${code}','stock',this.value)"></td>
<td><button onclick="deleteProduct('${code}')">削除</button></td>
</tr>
`


tbody.innerHTML += row

}


document.getElementById("total").innerText="在庫金額合計（買値）: "+totalValue

}

function addProduct(){

let code=document.getElementById("barcode").value
let name=document.getElementById("name").value
let sell=parseFloat(document.getElementById("sell").value)||0
let buy=parseFloat(document.getElementById("buy").value)||0
let stock=parseInt(document.getElementById("stock").value)||0

if(!code || !name){
alert("バーコードと商品名を入力してください")
return
}

if(!db[code]){

db[code]={name:name,sell:sell,buy:buy,stock:stock}

}

save()

}

function deleteProduct(code){

if(confirm("削除しますか？")){

delete db[code]

save()

}

}

function searchProduct(){

let q=document.getElementById("search").value

const tbody=document.getElementById("tbody")
let totalValue=0

tbody.innerHTML=""

for(let code in db){

let item=db[code]

if(code.includes(q)||item.name.includes(q)){

let value=(item.buy||0)*(item.stock||0)

totalValue+=value

let row=`
<tr>
<td>${code}</td>
<td>${item.name}</td>
<td><input class="tableInput" value="${item.sell}" onchange="updateField('${code}','sell',this.value)"></td>
<td><input class="tableInput" value="${item.buy}" onchange="updateField('${code}','buy',this.value)"></td>
<td><input class="tableInput" value="${item.stock}" onchange="updateField('${code}','stock',this.value)"></td>
<td><button onclick="deleteProduct('${code}')">削除</button></td>
</tr>
`


tbody.innerHTML+=row

}

}


document.getElementById("total").innerText="在庫金額合計（買値）: "+totalValue

}

function exportCSV(){

let csv="バーコード,商品名,売値,買値,在庫\n"

for(let code in db){
let item=db[code]

csv+=`${code},${item.name},${item.sell},${item.buy},${item.stock}\n`

}

let blob=new Blob([csv])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="inventory.csv"

a.click()

}

function startScanner(){

const qr=new Html5Qrcode("reader")

qr.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(code)=>{

document.getElementById("barcode").value=code

qr.stop()

}

)

}

render()

</script>

</body>
</html>
